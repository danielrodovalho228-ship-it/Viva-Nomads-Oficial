name: E2E (Playwright)

# Roda a suíte E2E contra o PREVIEW da Vercel assim que o deploy fica pronto
# (deployment_status = success), e também sob demanda com uma URL manual.
# Segredos (contas de teste) vêm de GitHub Secrets — nunca no yml.
on:
  deployment_status:
  workflow_dispatch:
    inputs:
      base_url:
        description: "URL alvo (preview da Vercel ou produção p/ smoke)"
        required: true

concurrency:
  group: e2e-${{ github.event.deployment_status.target_url || github.event.inputs.base_url || github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    # No gatilho de deploy, só roda quando o preview ficou pronto (success).
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'deployment_status' && github.event.deployment_status.state == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TESTES_BASE_URL: ${{ github.event.deployment_status.target_url || github.event.inputs.base_url }}
      TESTES_INQUILINO_EMAIL: ${{ secrets.TESTES_INQUILINO_EMAIL }}
      TESTES_INQUILINO_SENHA: ${{ secrets.TESTES_INQUILINO_SENHA }}
      TESTES_INQUILINO_NOME: ${{ secrets.TESTES_INQUILINO_NOME }}
      # inquilino2 é OPCIONAL (T-TRAV-C recusa a 2ª); ausente → os testes se pulam.
      TESTES_INQUILINO2_EMAIL: ${{ secrets.TESTES_INQUILINO2_EMAIL }}
      TESTES_INQUILINO2_SENHA: ${{ secrets.TESTES_INQUILINO2_SENHA }}
      TESTES_INQUILINO2_NOME: ${{ secrets.TESTES_INQUILINO2_NOME }}
      TESTES_PROPRIETARIO_EMAIL: ${{ secrets.TESTES_PROPRIETARIO_EMAIL }}
      TESTES_PROPRIETARIO_SENHA: ${{ secrets.TESTES_PROPRIETARIO_SENHA }}
      TESTES_PROPRIETARIO_NOME: ${{ secrets.TESTES_PROPRIETARIO_NOME }}
      TESTES_ADMIN_EMAIL: ${{ secrets.TESTES_ADMIN_EMAIL }}
      TESTES_ADMIN_SENHA: ${{ secrets.TESTES_ADMIN_SENHA }}
      TESTES_ADMIN_NOME: ${{ secrets.TESTES_ADMIN_NOME }}
      # Seed (service role do projeto de TESTE) — habilita T-TRAV-B/C (pedido +
      # imóvel publicado). Se o segredo não existir, o passo de seed é pulado e
      # os testes dependentes se pulam sozinhos (resilientes).
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.TESTES_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.TESTES_SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Instalar Chromium do Playwright
        run: npx playwright install --with-deps chromium

      - name: Semear dados de teste (se houver service role)
        if: ${{ env.SUPABASE_SERVICE_ROLE_KEY != '' }}
        run: npm run seed:teste

      - name: Rodar suíte E2E
        run: npm run testes

      - name: Publicar relatório HTML
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
