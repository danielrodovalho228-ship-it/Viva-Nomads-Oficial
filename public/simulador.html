<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Página privada: não indexar nem seguir links. -->
    <meta name="robots" content="noindex, nofollow" />
    <title>Simulador · Viva Nomads</title>
    <style>
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #f1f5f4;
             font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; color: #1f2933; }
      .card { max-width: 520px; width: 92%; background: #fff; border: 1px solid #e5e7eb;
              border-radius: 16px; padding: 32px; text-align: center; }
      h1 { font-size: 22px; margin: 8px 0 12px; }
      .brand span:first-child { color: #1E63D0; } .brand span:last-child { color: #6CBE2A; }
      .brand { font-weight: 800; font-size: 20px; letter-spacing: -0.5px; }
      p { color: #5b6573; line-height: 1.6; font-size: 15px; }
      code { background: #f1f5f4; padding: 2px 6px; border-radius: 6px; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="brand"><span>Viva</span><span>Nomads</span></div>
      <h1>Simulador</h1>
      <p>
        Esta é a página do simulador (privada, não listada). Substitua o conteúdo de
        <code>public/simulador.html</code> pelo HTML do simulador para publicá-lo aqui.
      </p>
    </div>
  </body>
</html>
